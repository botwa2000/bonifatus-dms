# .github/workflows/deploy.yml
# Bonifatus DMS - Automated Deployment to Google Cloud Run
# Deploys backend to Cloud Run on push to main/develop branches

name: Deploy Bonifatus DMS to Cloud Run

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  REGION: us-central1
  SERVICE_NAME: bonifatus-dms-api

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: test_bonifatus
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linting
      run: |
        cd backend
        pip install flake8 black
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check src

    - name: Run tests
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_bonifatus
        SECURITY_SECRET_KEY: test-secret-key-for-testing
        GOOGLE_CLIENT_ID: test-client-id
        GOOGLE_CLIENT_SECRET: test-client-secret
        APP_ENVIRONMENT: testing
      run: |
        cd backend
        pytest --cov=src --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: codecov-backend

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run security scan
      uses: securecodewarrior/github-action-add-sarif@v1
      with:
        sarif-file: 'security-scan-results.sarif'

    - name: Run dependency vulnerability scan
      run: |
        cd backend
        pip install safety
        safety check --json --output safety-report.json || true

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v1
      with:
        version: 'latest'

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Configure Docker to use gcloud as a credential helper
      run: gcloud auth configure-docker

    - name: Determine environment
      id: env
      run: |
        if [[ $GITHUB_REF == 'refs/heads/main' ]]; then
          echo "ENVIRONMENT=production" >> $GITHUB_OUTPUT
          echo "SERVICE_SUFFIX=" >> $GITHUB_OUTPUT
        else
          echo "ENVIRONMENT=staging" >> $GITHUB_OUTPUT
          echo "SERVICE_SUFFIX=-staging" >> $GITHUB_OUTPUT
        fi

    - name: Build Docker image
      run: |
        cd backend
        docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME${{ steps.env.outputs.SERVICE_SUFFIX }}:$GITHUB_SHA .
        docker tag gcr.io/$PROJECT_ID/$SERVICE_NAME${{ steps.env.outputs.SERVICE_SUFFIX }}:$GITHUB_SHA gcr.io/$PROJECT_ID/$SERVICE_NAME${{ steps.env.outputs.SERVICE_SUFFIX }}:latest

    - name: Push Docker image
      run: |
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME${{ steps.env.outputs.SERVICE_SUFFIX }}:$GITHUB_SHA
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME${{ steps.env.outputs.SERVICE_SUFFIX }}:latest

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy $SERVICE_NAME${{ steps.env.outputs.SERVICE_SUFFIX }} \
          --image gcr.io/$PROJECT_ID/$SERVICE_NAME${{ steps.env.outputs.SERVICE_SUFFIX }}:$GITHUB_SHA \
          --platform managed \
          --region $REGION \
          --allow-unauthenticated \
          --memory 1Gi \
          --cpu 1 \
          --timeout 300 \
          --max-instances 10 \
          --port 8000 \
          --set-env-vars APP_ENVIRONMENT=${{ steps.env.outputs.ENVIRONMENT }} \
          --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" \
          --set-env-vars GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
          --set-env-vars GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
          --set-env-vars SECURITY_SECRET_KEY="${{ secrets.SECURITY_SECRET_KEY }}" \
          --set-env-vars APP_CORS_ORIGINS="https://$SERVICE_NAME${{ steps.env.outputs.SERVICE_SUFFIX }}-*.run.app" \
          --quiet

    - name: Get deployment URL
      id: deploy-url
      run: |
        URL=$(gcloud run services describe $SERVICE_NAME${{ steps.env.outputs.SERVICE_SUFFIX }} --platform managed --region $REGION --format 'value(status.url)')
        echo "SERVICE_URL=$URL" >> $GITHUB_OUTPUT

    - name: Run health check
      run: |
        sleep 30
        curl -f "${{ steps.deploy-url.outputs.SERVICE_URL }}/health" || exit 1

    - name: Run database migrations
      if: steps.env.outputs.ENVIRONMENT == 'production'
      run: |
        gcloud run jobs create migration-job-$(date +%s) \
          --image gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA \
          --region $REGION \
          --task-timeout 600 \
          --max-retries 1 \
          --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" \
          --command "python" \
          --args "-m,alembic,upgrade,head" \
          --execute-now \
          --wait

    - name: Update GitHub deployment status
      uses: chrnorm/deployment-action@v2
      with:
        token: ${{ github.token }}
        environment: ${{ steps.env.outputs.ENVIRONMENT }}
        environment-url: ${{ steps.deploy-url.outputs.SERVICE_URL }}
        state: success

    - name: Notify deployment success
      if: success() && github.ref == 'refs/heads/main'
      run: |
        echo "✅ Bonifatus DMS deployed successfully!"
        echo "🔗 Production URL: ${{ steps.deploy-url.outputs.SERVICE_URL }}"
        echo "📚 API Docs: ${{ steps.deploy-url.outputs.SERVICE_URL }}/api/docs"
        echo "❤️ Health Check: ${{ steps.deploy-url.outputs.SERVICE_URL }}/health"

  cleanup:
    name: Cleanup old images
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v1

    - name: Clean up old container images
      run: |
        # Keep last 10 images, delete older ones
        gcloud container images list-tags gcr.io/$PROJECT_ID/$SERVICE_NAME \
          --limit=999999 \
          --sort-by=TIMESTAMP \
          --filter="timestamp.date('%Y-%m-%d')<=$(date -d '30 days ago' '+%Y-%m-%d')" \
          --format="get(digest)" | \
        while read digest; do
          if [[ -n "$digest" ]]; then
            gcloud container images delete "gcr.io/$PROJECT_ID/$SERVICE_NAME@$digest" --quiet || true
          fi
        done