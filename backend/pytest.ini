# backend/pytest.ini
# Bonifatus DMS - Pytest Configuration
# Test configuration for comprehensive test coverage

[tool:pytest]
# Minimum version requirement
minversion = 6.0

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add source directory to Python path
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=85
    --asyncio-mode=auto

# Coverage configuration
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

# Test markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, API)
    e2e: End-to-end tests (full application)
    slow: Slow running tests
    auth: Authentication related tests
    google_drive: Google Drive integration tests
    search: Search functionality tests
    categories: Category management tests
    documents: Document management tests
    users: User management tests

# Asyncio configuration
asyncio_mode = auto

# Logging configuration
log_level = INFO
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Ignore deprecation warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*unclosed.*:ResourceWarning

# Test environment variables
env = 
    APP_ENVIRONMENT = testing
    SECURITY_SECRET_KEY = test-secret-key-for-testing-only
    GOOGLE_CLIENT_ID = test-google-client-id
    GOOGLE_CLIENT_SECRET = test-google-client-secret
    DATABASE_URL = sqlite:///./test_bonifatus.db